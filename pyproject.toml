[project]
name = "ww-quokka-sims"
version = "0.1.0"
description = "python utility library for working with quokka simulations"
readme = "README.md"
authors = [
  { name = "Neco Kriel", email = "necokriel@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
  "imageio>=2.37.0",
  "numpy>=2.3.2",
  "yt>=4.4.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
sources = ["src"]

[tool.pyright]
include = [
    "src",
    "scripts",
]
extraPaths = ["src"]
reportMissingImports = true
reportMissingTypeStubs = false
